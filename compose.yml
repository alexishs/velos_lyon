networks:
  data-net:
    driver: bridge

volumes:
  hdfs-namenode:
  hdfs-datanode:
  hive-metastore-db:
  kafka-data:
  atlas-data:
  postgres-airflow:
  airflow-logs:
  airflow-plugins:

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW_CONN_KAFKA_DEFAULT: '{"conn_type": "kafka", "extra": {"bootstrap.servers": "kafka:29092", "group.id": "airflow-sensor", "auto.offset.reset": "earliest"}}'
  JCDECAUX_API_KEY: ${JCDECAUX_API_KEY}
  PYTHONPATH: /opt/airflow/lib

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  user: "${AIRFLOW_UID}:0"
  environment: *airflow-env
  volumes:
    - ./dag:/opt/airflow/dags
    - .:/opt/airflow/lib:ro
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  networks:
    - data-net
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  # --- HDFS ---
  namenode:
    build:
      context: .
      dockerfile: Dockerfile.namenode
    container_name: namenode
    environment:
      CLUSTER_NAME: data-cluster
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hdfs-namenode:/hadoop/dfs/name
    networks:
      - data-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    depends_on:
      - namenode
    volumes:
      - hdfs-datanode:/hadoop/dfs/data
    networks:
      - data-net

  # --- MAPREDUCE / YARN ---
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "8088:8088"
    depends_on:
      - namenode
      - datanode
    networks:
      - data-net

  nodemanager:
    build:
      context: .
      dockerfile: Dockerfile.nodemanager
    container_name: nodemanager
    restart: unless-stopped
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
      resourcemanager:
        condition: service_healthy
    networks:
      - data-net

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "8188:8188"
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
    networks:
      - data-net

  # --- HIVE ---
  hive-metastore-db:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: hive-metastore-db
    volumes:
      - hive-metastore-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "hive"]
      interval: 5s
      retries: 10
    networks:
      - data-net

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    restart: unless-stopped
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore-db/metastore"
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9083:9083"
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
      hive-metastore-db:
        condition: service_healthy
    networks:
      - data-net

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    restart: unless-stopped
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore-db/metastore"
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "10000:10000"
    depends_on:
      hive-metastore:
        condition: service_started
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
    networks:
      - data-net

  # --- KAFKA (Mode KRaft, sans ZooKeeper) ---
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - data-net

  # --- APACHE ATLAS ---
  atlas:
    image: sburn/apache-atlas:latest
    container_name: atlas
    ports:
      - "21000:21000"
    volumes:
      - atlas-data:/opt/apache-atlas/data
    networks:
      - data-net

  # --- AIRFLOW ---
  postgres-airflow:
    image: postgres:13
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres-airflow:/var/lib/postgresql/data
    networks:
      - data-net

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: version
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        UID: ${AIRFLOW_UID}
        GID: ${AIRFLOW_UID}
    container_name: dev
    environment:
      JCDECAUX_API_KEY: ${JCDECAUX_API_KEY}
      KAFKA_BROKER: kafka:29092
    volumes:
      - .:/workspace
    working_dir: /workspace
    networks:
      - data-net
